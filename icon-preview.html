<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏日韓國旅遊 - 極簡雪花 Icon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 40px;
            font-size: 14px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .preview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .preview-box {
            background: linear-gradient(135deg, #E0F7FF 0%, #B3E5FC 100%);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .preview-label {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            text-align: center;
            font-weight: 500;
        }

        svg {
            width: 160px;
            height: 160px;
        }

        .design-description {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .design-description h3 {
            color: #333;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .design-description ul {
            list-style: none;
            padding: 0;
        }

        .design-description li {
            color: #666;
            margin: 8px 0;
            padding-left: 20px;
            position: relative;
        }

        .design-description li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #00BCD4;
            font-weight: bold;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-download {
            background: linear-gradient(135deg, #00BCD4 0%, #0097A7 100%);
            color: white;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 188, 212, 0.4);
        }

        .info-box {
            background: #e8f5ff;
            border-left: 4px solid #2196f3;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            margin-top: 20px;
        }

        .success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 12px;
            border-radius: 8px;
            color: #2e7d32;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }

        @media (max-width: 600px) {
            .preview-container {
                grid-template-columns: 1fr;
            }

            .controls {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>❄️ 極簡雪花韓國 Icon</h1>
        <p class="subtitle">2026 韓國釜山夏日旅遊</p>

        <div class="success" id="successMsg"></div>

        <!-- 設計概念 -->
        <div class="section">
            <div class="section-title">🎨 設計概念</div>
            <div class="design-description">
                <h3>視覺元素：</h3>
                <ul>
                    <li>中心太極圓（紅藍韓國國旗象徵）</li>
                    <li>6 點對稱雪花（冰雪清涼感）</li>
                    <li>冰藍漸變背景（夏日清爽）</li>
                    <li>極簡幾何風格（現代極簡）</li>
                </ul>
            </div>
        </div>

        <!-- 預覽區域 -->
        <div class="section">
            <div class="section-title">📱 Icon 預覽</div>
            
            <div class="preview-container">
                <!-- 版本 1: 雪花 + 太極 -->
                <div>
                    <div class="preview-box">
                        <svg id="iconV1" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#E0F7FF;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#B3E5FC;stop-opacity:1" />
                                </linearGradient>
                            </defs>
                            <rect width="180" height="180" fill="url(#bg1)"/>
                            
                            <!-- 雪花 -->
                            <g id="snow1">
                                <line x1="90" y1="15" x2="90" y2="55" stroke="#00BCD4" stroke-width="3" stroke-linecap="round"/>
                                <line x1="90" y1="125" x2="90" y2="165" stroke="#00BCD4" stroke-width="3" stroke-linecap="round"/>
                                <line x1="30" y1="45" x2="60" y2="75" stroke="#00BCD4" stroke-width="3" stroke-linecap="round"/>
                                <line x1="120" y1="105" x2="150" y2="135" stroke="#00BCD4" stroke-width="3" stroke-linecap="round"/>
                                <line x1="150" y1="45" x2="120" y2="75" stroke="#00BCD4" stroke-width="3" stroke-linecap="round"/>
                                <line x1="60" y1="105" x2="30" y2="135" stroke="#00BCD4" stroke-width="3" stroke-linecap="round"/>
                                
                                <!-- 小分支 -->
                                <line x1="75" y1="32" x2="65" y2="50" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
                                <line x1="105" y1="32" x2="115" y2="50" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
                                <line x1="45" y1="60" x2="35" y2="75" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
                                <line x1="135" y1="100" x2="145" y2="115" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
                            </g>
                            
                            <!-- 中心太極 -->
                            <circle cx="90" cy="90" r="28" fill="white" stroke="#00BCD4" stroke-width="1" opacity="0.4"/>
                            <path d="M 90 62 A 28 28 0 0 1 118 90 A 28 28 0 0 1 90 90 Z" fill="#FF6B6B"/>
                            <path d="M 90 90 A 28 28 0 0 1 62 90 A 28 28 0 0 1 90 90 Z" fill="#0097A7"/>
                            <circle cx="90" cy="76" r="2.5" fill="#FF6B6B"/>
                            <circle cx="90" cy="104" r="2.5" fill="#0097A7"/>
                        </svg>
                    </div>
                    <div class="preview-label">✨ 版本 1：雪花 + 韓國太極</div>
                </div>

                <!-- 版本 2: 純雪花 -->
                <div>
                    <div class="preview-box">
                        <svg id="iconV2" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#E0F7FF;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#B3E5FC;stop-opacity:1" />
                                </linearGradient>
                            </defs>
                            <rect width="180" height="180" fill="url(#bg2)"/>
                            
                            <!-- 純雪花 -->
                            <g id="snow2" transform="translate(90, 90)">
                                <line x1="0" y1="-55" x2="0" y2="-20" stroke="#00BCD4" stroke-width="4" stroke-linecap="round"/>
                                <line x1="0" y1="20" x2="0" y2="55" stroke="#00BCD4" stroke-width="4" stroke-linecap="round"/>
                                <line x1="-47.6" y1="-27.5" x2="-67" y2="-40" stroke="#00BCD4" stroke-width="4" stroke-linecap="round"/>
                                <line x1="47.6" y1="27.5" x2="67" y2="40" stroke="#00BCD4" stroke-width="4" stroke-linecap="round"/>
                                <line x1="47.6" y1="-27.5" x2="67" y2="-40" stroke="#00BCD4" stroke-width="4" stroke-linecap="round"/>
                                <line x1="-47.6" y1="27.5" x2="-67" y2="40" stroke="#00BCD4" stroke-width="4" stroke-linecap="round"/>
                                
                                <!-- 小分支 -->
                                <line x1="-12" y1="-30" x2="-25" y2="-50" stroke="#00BCD4" stroke-width="2.5" stroke-linecap="round"/>
                                <line x1="12" y1="-30" x2="25" y2="-50" stroke="#00BCD4" stroke-width="2.5" stroke-linecap="round"/>
                                <line x1="-12" y1="30" x2="-25" y2="50" stroke="#00BCD4" stroke-width="2.5" stroke-linecap="round"/>
                                <line x1="12" y1="30" x2="25" y2="50" stroke="#00BCD4" stroke-width="2.5" stroke-linecap="round"/>
                            </g>
                            
                            <!-- 中心點 -->
                            <circle cx="90" cy="90" r="5" fill="#00BCD4"/>
                        </svg>
                    </div>
                    <div class="preview-label">❄️ 版本 2：純雪花</div>
                </div>
            </div>

            <div class="info-box">
                <strong>💡 選擇你喜歡的版本</strong><br>
                版本 1：融合韓國文化（太極 + 雪花）<br>
                版本 2：清爽簡潔（純雪花設計）
            </div>
        </div>

        <!-- 下載區域 -->
        <div class="section">
            <div class="controls">
                <button class="btn-download" onclick="downloadPNG('iconV1', 'snowflake-korea-v1')">
                    📥 下載版本 1
                </button>
                <button class="btn-download" onclick="downloadPNG('iconV2', 'snowflake-korea-v2')">
                    📥 下載版本 2
                </button>
            </div>
        </div>
    </div>

    <script>
        async function downloadPNG(svgId, filename) {
            try {
                const svg = document.getElementById(svgId);
                const svgString = new XMLSerializer().serializeToString(svg);

                const canvas = document.createElement('canvas');
                canvas.width = 180;
                canvas.height = 180;
                const ctx = canvas.getContext('2d');

                const img = new Image();
                const svgBlob = new Blob([svgString], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(svgBlob);

                img.onload = function() {
                    ctx.drawImage(img, 0, 0, 180, 180);
                    URL.revokeObjectURL(url);

                    canvas.toBlob(function(blob) {
                        const downloadUrl = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.href = downloadUrl;
                        link.download = `${filename}-180x180.png`;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        URL.revokeObjectURL(downloadUrl);

                        showSuccess(`✅ ${filename} 已下載！`);
                    }, 'image/png');
                };

                img.onerror = function() {
                    alert('❌ 圖片加載失敗');
                };

                img.src = 'data:image/svg+xml;base64,' + btoa(svgString);
            } catch (error) {
                alert('❌ 下載失敗: ' + error.message);
            }
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
