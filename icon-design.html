<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡雪花韓國 Icon</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            padding: 40px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .card {
            text-align: center;
        }
        .preview {
            background: linear-gradient(135deg, #E0F7FF 0%, #B3E5FC 100%);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 15px;
            min-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        svg {
            width: 160px;
            height: 160px;
        }
        .title {
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #00BCD4 0%, #0097A7 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 188, 212, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>❄️ 極簡雪花韓國 Icon</h1>
        
        <div class="grid">
            <div class="card">
                <div class="preview">
                    <svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#E0F7FF;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#B3E5FC;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <rect width="180" height="180" fill="url(#bg1)"/>
                        <line x1="90" y1="15" x2="90" y2="55" stroke="#00BCD4" stroke-width="3" stroke-linecap="round"/>
                        <line x1="90" y1="125" x2="90" y2="165" stroke="#00BCD4" stroke-width="3" stroke-linecap="round"/>
                        <line x1="30" y1="45" x2="60" y2="75" stroke="#00BCD4" stroke-width="3" stroke-linecap="round"/>
                        <line x1="120" y1="105" x2="150" y2="135" stroke="#00BCD4" stroke-width="3" stroke-linecap="round"/>
                        <line x1="150" y1="45" x2="120" y2="75" stroke="#00BCD4" stroke-width="3" stroke-linecap="round"/>
                        <line x1="60" y1="105" x2="30" y2="135" stroke="#00BCD4" stroke-width="3" stroke-linecap="round"/>
                        <line x1="75" y1="32" x2="65" y2="50" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
                        <line x1="105" y1="32" x2="115" y2="50" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="90" cy="90" r="28" fill="white" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
                        <path d="M 90 62 A 28 28 0 0 1 118 90 A 28 28 0 0 1 90 90 Z" fill="#FF6B6B"/>
                        <path d="M 90 90 A 28 28 0 0 1 62 90 A 28 28 0 0 1 90 90 Z" fill="#0097A7"/>
                        <circle cx="90" cy="76" r="2.5" fill="#FF6B6B"/>
                        <circle cx="90" cy="104" r="2.5" fill="#0097A7"/>
                    </svg>
                </div>
                <div class="title">版本 1：雪花 + 韓國太極</div>
                <button>📥 下載</button>
            </div>

            <div class="card">
                <div class="preview">
                    <svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#E0F7FF;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#B3E5FC;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <rect width="180" height="180" fill="url(#bg2)"/>
                        <g transform="translate(90, 90)">
                            <line x1="0" y1="-55" x2="0" y2="-20" stroke="#00BCD4" stroke-width="4" stroke-linecap="round"/>
                            <line x1="0" y1="20" x2="0" y2="55" stroke="#00BCD4" stroke-width="4" stroke-linecap="round"/>
                            <line x1="-47.6" y1="-27.5" x2="-67" y2="-40" stroke="#00BCD4" stroke-width="4" stroke-linecap="round"/>
                            <line x1="47.6" y1="27.5" x2="67" y2="40" stroke="#00BCD4" stroke-width="4" stroke-linecap="round"/>
                            <line x1="47.6" y1="-27.5" x2="67" y2="-40" stroke="#00BCD4" stroke-width="4" stroke-linecap="round"/>
                            <line x1="-47.6" y1="27.5" x2="-67" y2="40" stroke="#00BCD4" stroke-width="4" stroke-linecap="round"/>
                            <line x1="-12" y1="-30" x2="-25" y2="-50" stroke="#00BCD4" stroke-width="2.5" stroke-linecap="round"/>
                            <line x1="12" y1="-30" x2="25" y2="-50" stroke="#00BCD4" stroke-width="2.5" stroke-linecap="round"/>
                        </g>
                        <circle cx="90" cy="90" r="5" fill="#00BCD4"/>
                    </svg>
                </div>
                <div class="title">版本 2：純雪花設計</div>
                <button>📥 下載</button>
            </div>
        </div>
    </div>
</body>
</html>
