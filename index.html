<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 韓國釜山旅遊 App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            padding: 50px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .icon-preview {
            margin: 40px 0;
            display: flex;
            justify-content: center;
        }

        .icon-box {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #E0F7FF 0%, #B3E5FC 100%);
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        svg {
            width: 140px;
            height: 140px;
        }

        .menu {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin: 30px 0;
        }

        .menu-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .menu-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .menu-item.secondary {
            background: #f0f0f0;
            color: #333;
        }

        .menu-item.secondary:hover {
            background: #e0e0e0;
        }

        .info {
            background: #e8f5ff;
            border-left: 4px solid #2196f3;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            margin-top: 30px;
            text-align: left;
        }

        .info strong {
            color: #1976d2;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 24px;
            }

            .container {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇰🇷 2026 韓國釜山旅遊</h1>
        <p class="subtitle">夏日清涼旅遊規劃 App</p>

        <div class="icon-preview">
            <div class="icon-box">
                <svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#E0F7FF;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#B3E5FC;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#0097A7;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    
                    <rect width="180" height="180" fill="url(#bgGradient)"/>
                    
                    <g id="taegeuk">
                        <circle cx="90" cy="85" r="48" fill="none" stroke="url(#iconGradient)" stroke-width="2" opacity="0.3"/>
                        <path d="M 90 37 A 48 48 0 0 1 135 85 A 48 48 0 0 1 90 85 Z" fill="#FF6B6B" opacity="0.8"/>
                        <path d="M 90 85 A 48 48 0 0 1 45 85 A 48 48 0 0 1 90 85 Z" fill="#00BCD4"/>
                        <circle cx="90" cy="60" r="4" fill="#FF6B6B"/>
                        <circle cx="90" cy="110" r="4" fill="#00BCD4"/>
                    </g>
                    
                    <g id="ice">
                        <path d="M 90 30 L 85 38 L 95 38 Z" fill="#00BCD4" opacity="0.7"/>
                        <circle cx="90" cy="35" r="2" fill="#FFFFFF"/>
                    </g>
                    
                    <g id="landmark">
                        <rect x="85" y="130" width="10" height="20" fill="#00BCD4" opacity="0.7"/>
                        <polygon points="90,125 88,130 92,130" fill="#00BCD4" opacity="0.7"/>
                        <circle cx="90" cy="127" r="1.5" fill="#FFFFFF"/>
                    </g>
                    
                    <g id="wave" opacity="0.4">
                        <path d="M 30 90 Q 35 88 40 90" stroke="#00BCD4" stroke-width="1.5" fill="none"/>
                        <path d="M 140 90 Q 145 88 150 90" stroke="#00BCD4" stroke-width="1.5" fill="none"/>
                    </g>
                </svg>
            </div>
        </div>

        <div class="menu">
            <a href="svg-to-png-converter.html" class="menu-item">
                🎨 Icon 轉換器 (SVG → PNG)
            </a>
            <a href="busan-trip-app.html" class="menu-item secondary">
                ✈️ 釜山旅遊規劃
            </a>
        </div>

        <div class="info">
            <strong>📱 如何在 iPhone 上使用？</strong><br><br>
            1. 在 Safari 中打開此網站<br>
            2. 點擊分享按鈕 ↗️<br>
            3. 選擇「加到主畫面」<br>
            4. Icon 會自動應用此設計
        </div>
    </div>
</body>
</html>
